name: A4 lineage application
on:
  push:
    branches: [a4-apply-lineage]
    paths: [.github/workflows/a4-apply-lineage.yml]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: a4-apply-lineage
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/apply-reviewed-lineage-a4.mjs
      - run: npm run records:validate
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add records/exchanges config/lineage-a4-application.json scripts/apply-reviewed-lineage-a4.mjs .github/workflows/a4-apply-lineage.yml
          git commit -m "Apply reviewed A4 lineage actions"
          git push origin HEAD:a4-apply-lineage

name: Finalize C1 roadmap

on:
  push:
    branches:
      - c1-candidate-scan-01
    paths:
      - .github/workflows/c1-roadmap-finalize.yml
      - scripts/apply-c1-roadmap.mjs

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: c1-candidate-scan-01
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/apply-c1-roadmap.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Advance roadmap after C1 candidate scan
          file_pattern: docs/HEI_V1_EXECUTION_ROADMAP.md
          branch: c1-candidate-scan-01

name: Temporary fix Backpack raw expectation

on:
  push:
    branches:
      - rebuild-verified-unadded-0101-0150
    paths:
      - '.github/workflows/temp-fix-backpack-raw-expectation.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild-verified-unadded-0101-0150
          fetch-depth: 0
      - name: Align correction with raw canonical data
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'records/exchanges/backpack-exchange.json'
          const data = JSON.parse(fs.readFileSync(path, 'utf8'))
          data.entity_correction.expected = {
            launch_date: '2024-01-01',
            summary: 'Crypto exchange candidate from the CCXT-supported exchange list and official Backpack Exchange domain. HEI records it as an active centralized exchange seed because it has an official trading-domain identity beyond a single database row.',
            official_url_status: 'live_unverified',
            confidence: 'medium',
            notes: '',
            last_verified_at: '2026-06-01'
          }
          data.entity_correction.changes = {
            launch_date: data.entity.launch_date,
            summary: data.entity.summary,
            official_url_status: data.entity.official_url_status,
            confidence: data.entity.confidence,
            notes: data.entity.notes,
            last_verified_at: data.entity.last_verified_at
          }
          fs.writeFileSync(path, `${JSON.stringify(data)}\n`)
          NODE
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add records/exchanges/backpack-exchange.json
          git commit -m "Align Backpack correction with raw canonical data"
          git push origin HEAD:rebuild-verified-unadded-0101-0150

name: Build C1 candidate scan

on:
  push:
    branches:
      - c1-candidate-scan-01
    paths:
      - .github/workflows/c1-build-scan.yml
      - scripts/build-c1-candidate-scan.mjs
      - data-staging/watchlists/resolution/index.json

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: c1-candidate-scan-01
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build-c1-candidate-scan.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Build C1 candidate scan manifest
          file_pattern: data-staging/candidate-scans/c1-scan-01.json
          branch: c1-candidate-scan-01

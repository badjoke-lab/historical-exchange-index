name: Temporary public validation diagnostics

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'config/**'
      - 'package.json'
      - '.github/workflows/temp-public-validation-diagnostics.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build machine-readable layer
        run: npm run machine:build

      - name: Build public site
        run: npm run build

      - name: Capture public validation log
        id: validation
        continue-on-error: true
        run: |
          mkdir -p artifacts/public-validation-diagnostics
          set +e
          npm run public:validate > artifacts/public-validation-diagnostics/public-validation.log 2>&1
          status=$?
          echo "$status" > artifacts/public-validation-diagnostics/exit-code.txt
          cat artifacts/public-validation-diagnostics/public-validation.log
          exit "$status"

      - name: Upload public validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hei-public-validation-diagnostics-${{ github.run_id }}
          path: artifacts/public-validation-diagnostics
          retention-days: 7
          if-no-files-found: error

      - name: Enforce public validation
        if: always()
        run: test '${{ steps.validation.outcome }}' = 'success'

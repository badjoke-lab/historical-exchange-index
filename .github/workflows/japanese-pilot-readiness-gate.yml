name: Japanese Pilot readiness gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test Japanese Pilot readiness validator
        run: node scripts/validate-japanese-pilot-readiness.mjs --self-test

      - name: Test localized site chrome
        run: node scripts/test-localized-site-chrome.mjs

      - name: Test page presentation foundation
        run: node scripts/test-page-presentation-foundation.mjs

      - name: Test page presentation connections
        run: node scripts/test-page-presentation-connections.mjs

      - name: Test secondary page presentation connections
        run: node scripts/test-secondary-page-presentation-connections.mjs

      - name: Test Japanese route shell source contract
        run: node scripts/test-japanese-route-shell-source.mjs

      - name: Test Japanese static HTML postprocessor
        run: npm run i18n:static-html:test

      - name: Test L1-5 copy overlay runtime
        run: node scripts/test-copy-overlay-runtime.mjs

      - name: Build machine-readable layer
        run: npm run machine:build

      - name: Build public site
        run: npm run build

      - name: Diagnose internal links
        continue-on-error: true
        run: npm run links:audit

      - name: Diagnose public metadata
        continue-on-error: true
        run: npm run metadata:audit

      - name: Diagnose sitemap
        continue-on-error: true
        run: npm run sitemap:audit

      - name: Diagnose navigation discovery
        continue-on-error: true
        run: npm run navigation:audit

      - name: Diagnose Stats Explorer handoff
        continue-on-error: true
        run: npm run explorer:handoff:validate

      - name: Diagnose Explorer query contract
        continue-on-error: true
        run: npm run explorer:contract:validate

      - name: Diagnose Compare v1
        continue-on-error: true
        run: npm run compare:audit

      - name: Diagnose i18n foundation
        continue-on-error: true
        run: npm run i18n:validate

      - name: Diagnose accessibility
        continue-on-error: true
        run: npm run accessibility:audit

      - name: Diagnose URL safety
        continue-on-error: true
        run: npm run url-safety:audit

      - name: Diagnose cross-surface integration
        continue-on-error: true
        run: npm run integration:audit

      - name: Diagnose machine/public consistency
        continue-on-error: true
        run: npm run consistency:audit

      - name: Run full public validation gate
        run: npm run public:validate

      - name: Validate L1 i18n foundation
        run: npm run i18n:validate

      - name: Validate Japanese Pilot public activation
        run: node scripts/validate-japanese-pilot-readiness.mjs

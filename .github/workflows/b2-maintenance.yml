name: B2 maintenance

on:
  push:
    branches:
      - b2-watchlist-resolutions
    paths:
      - .github/workflows/b2-maintenance.yml
      - scripts/patch-news-watch-b2.mjs
      - scripts/b2-maintenance-step.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: b2-watchlist-resolutions
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/patch-news-watch-b2.mjs
      - run: node scripts/b2-maintenance-step.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Complete B2 monitor integration
          file_pattern: scripts/monitoring/monitors/news-and-event-watch.mjs .github/workflows/ci-core.yml
          branch: b2-watchlist-resolutions

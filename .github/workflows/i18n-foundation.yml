name: I18n foundation gate

on:
  pull_request:
    paths:
      - 'src/i18n/**'
      - 'src/lib/i18n/**'
      - 'data-i18n/**'
      - 'config/i18n-*.json'
      - 'scripts/validate-i18n-foundation.mjs'
      - 'scripts/test-i18n-foundation.mjs'
      - 'docs/HEI_LOCALIZATION_STRATEGY_AND_FOUNDATION_SPEC.md'
      - 'package.json'
      - '.github/workflows/i18n-foundation.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate localization foundation
        run: npm run i18n:validate
      - name: Test localization foundation behavior
        run: npm run i18n:test

name: Remove temporary validator workflow

on:
  push:
    branches: [work-387e]
    paths: [.github/workflows/patch-validator.yml]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work-387e
      - name: Remove temporary workflow
        run: rm .github/workflows/patch-validator.yml
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Remove temporary validator workflow
          branch: work-387e

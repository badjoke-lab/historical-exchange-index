name: Finalize candidate overlap roadmap correction

on:
  push:
    branches:
      - c2-growth-batch-01a
    paths:
      - .github/workflows/c2-finalize-roadmap.yml
      - scripts/apply-c1-overlap-roadmap-correction.mjs

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: c2-growth-batch-01a
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/apply-c1-overlap-roadmap-correction.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Correct roadmap after candidate overlap audit
          file_pattern: docs/HEI_V1_EXECUTION_ROADMAP.md
          branch: c2-growth-batch-01a

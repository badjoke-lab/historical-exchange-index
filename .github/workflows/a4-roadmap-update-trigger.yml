name: Trigger A4 roadmap checkpoint

on:
  push:
    branches:
      - a4-apply-lineage
    paths:
      - .github/workflows/a4-roadmap-update-trigger.yml

permissions:
  contents: write

jobs:
  update-roadmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: a4-apply-lineage
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Update roadmap
        run: node scripts/update-roadmap-a4.mjs
      - name: Commit roadmap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update roadmap after A4 lineage implementation
          file_pattern: docs/HEI_V1_EXECUTION_ROADMAP.md
          branch: a4-apply-lineage

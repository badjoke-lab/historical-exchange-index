name: A3 L2 audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/export-lineage-l2-context.mjs --output=audit-output/a3-l2-context.json
      - uses: actions/upload-artifact@v4
        with:
          name: a3-l2-context
          path: audit-output/a3-l2-context.json
          retention-days: 3

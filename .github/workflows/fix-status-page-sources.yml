name: Correct status page source mappings

on:
  push:
    branches: [work-390]
    paths: [.github/workflows/fix-status-page-sources.yml]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work-390
      - name: Correct third-party status pages
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('data/evidence.json')
          evidence = json.loads(path.read_text())
          ids = {
            'hei_src_000478', 'hei_src_000481', 'hei_src_000487',
            'hei_src_000490', 'hei_src_000493', 'hei_src_000496',
            'hei_src_000499', 'hei_src_000502', 'hei_src_000505',
            'hei_src_000508', 'hei_src_000511', 'hei_src_000515',
            'hei_src_000518',
          }
          changed = 0
          for item in evidence:
              if item['id'] not in ids:
                  continue
              if item.get('source_type') != 'official_statement':
                  raise SystemExit(f"{item['id']}: unexpected source_type {item.get('source_type')}")
              item['source_type'] = 'database_reference'
              changed += 1
          if changed != len(ids):
              raise SystemExit(f'Expected {len(ids)} changes, found {changed}')
          path.write_text(json.dumps(evidence, indent=2, ensure_ascii=False) + '\n')
          PY
      - name: Remove temporary workflow
        run: rm -f .github/workflows/fix-status-page-sources.yml
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Correct status page source mappings
          branch: work-390

name: HEI Monitoring

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      enable_external_lists:
        description: "Enable optional remote external-list discovery"
        type: boolean
        default: false
      enable_news_rss:
        description: "Enable optional Google News RSS monitoring"
        type: boolean
        default: false
      enable_domain_checks:
        description: "Enable optional official site/domain checks"
        type: boolean
        default: false
      enable_evidence_url_checks:
        description: "Enable optional evidence URL checks"
        type: boolean
        default: false
      enable_regulatory_watch:
        description: "Enable optional regulatory source watch"
        type: boolean
        default: false
      enable_site_seo_checks:
        description: "Enable optional public site and SEO checks"
        type: boolean
        default: false
      site_url:
        description: "Site URL for route and sitemap checks"
        type: string
        default: "https://hei.badjoke-lab.com"
      news_query_limit:
        description: "Maximum news RSS queries"
        type: string
        default: "20"
      regulatory_query_limit:
        description: "Maximum regulatory RSS queries"
        type: string
        default: "25"
      domain_check_limit:
        description: "Maximum official domains to check"
        type: string
        default: "50"
      evidence_url_check_limit:
        description: "Maximum evidence URLs to check"
        type: string
        default: "50"

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: hei-monitoring-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitoring:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run monitor:smoke
      - name: Run monitoring
        id: monitor
        env:
          MANUAL_ENABLE_EXTERNAL_LISTS: ${{ github.event.inputs.enable_external_lists || 'false' }}
          MANUAL_ENABLE_NEWS_RSS: ${{ github.event.inputs.enable_news_rss || 'false' }}
          MANUAL_ENABLE_DOMAIN_CHECKS: ${{ github.event.inputs.enable_domain_checks || 'false' }}
          MANUAL_ENABLE_EVIDENCE_URL_CHECKS: ${{ github.event.inputs.enable_evidence_url_checks || 'false' }}
          MANUAL_ENABLE_REGULATORY_WATCH: ${{ github.event.inputs.enable_regulatory_watch || 'false' }}
          MANUAL_ENABLE_SITE_SEO_CHECKS: ${{ github.event.inputs.enable_site_seo_checks || 'false' }}
          MANUAL_SITE_URL: ${{ github.event.inputs.site_url || 'https://hei.badjoke-lab.com' }}
          MANUAL_NEWS_QUERY_LIMIT: ${{ github.event.inputs.news_query_limit || '20' }}
          MANUAL_REGULATORY_QUERY_LIMIT: ${{ github.event.inputs.regulatory_query_limit || '25' }}
          MANUAL_DOMAIN_CHECK_LIMIT: ${{ github.event.inputs.domain_check_limit || '50' }}
          MANUAL_EVIDENCE_URL_CHECK_LIMIT: ${{ github.event.inputs.evidence_url_check_limit || '50' }}
        run: node scripts/monitoring/run-github.mjs
      - name: Validate monitoring completion
        run: npm run monitor:check
      - name: Guard canonical data
        run: git diff --exit-code -- data/entities.json data/events.json data/evidence.json
      - name: Upload monitoring output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hei-monitoring-output
          path: |
            data-staging/monitoring
            data-staging/watchlists/auto
            data-staging/watchlists/resolution
          if-no-files-found: warn
          retention-days: 14
      - name: Check monitoring changes
        id: changes
        run: |
          if [ "${{ steps.monitor.outputs.meaningful_findings }}" = "true" ] && git status --porcelain -- data-staging/monitoring data-staging/watchlists/auto data-staging/watchlists/resolution | grep .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create monitoring pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/monitoring/create-report-pr.sh

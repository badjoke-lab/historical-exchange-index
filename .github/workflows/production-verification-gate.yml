name: Production verification gate

on:
  pull_request:
    paths:
      - 'config/production-verification-contract.json'
      - 'config/v1-baseline-contract.json'
      - 'scripts/check-machine-readable-production.mjs'
      - 'scripts/verify-production-integration.mjs'
      - 'scripts/validate-g5-production-baseline.mjs'
      - 'docs/audits/HEI_G5_PRODUCTION_VERIFICATION_*.md'
      - '.github/workflows/production-verification-gate.yml'
  workflow_dispatch:

jobs:
  g5-baseline-integrity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate immutable G-5 production evidence
        run: node scripts/validate-g5-production-baseline.mjs

      - name: Syntax-check live production verifier scripts
        run: |
          node --check scripts/check-machine-readable-production.mjs
          node --check scripts/verify-production-integration.mjs

      - name: Write verification summary
        if: always()
        shell: bash
        run: |
          {
            echo "# HEI G-5 Production Baseline Integrity"
            echo
            echo "Historical baseline evidence is validated offline."
            echo "Post-v1 live production verification is performed against the current target commit by the active phase verification plan, not by rewriting the immutable G-5 baseline contract."
          } > production-verification-summary.md

      - name: Upload production verification baseline summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-verification-baseline-report
          path: production-verification-summary.md
          if-no-files-found: error

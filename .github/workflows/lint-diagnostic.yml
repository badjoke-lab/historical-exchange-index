name: Lint diagnostic

on:
  push:
    branches: [audit-count-consistency-20260618]
    paths: [.github/workflows/lint-diagnostic.yml]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: audit-count-consistency-20260618
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent >/dev/null
      - name: Capture lint
        run: |
          mkdir -p docs/audits
          npm run lint --silent > docs/audits/latest-lint.log 2>&1 || true
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Record lint diagnostic
          branch: audit-count-consistency-20260618

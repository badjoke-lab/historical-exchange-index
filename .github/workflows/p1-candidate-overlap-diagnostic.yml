name: P1 candidate overlap diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/p1-candidate-overlap-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d750-batch-p1-fullsail-galaswap-heliswap
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture overlap reports
        shell: bash
        run: |
          mkdir -p p1-diagnostic
          set +e
          node scripts/audit-open-candidate-canonical-overlap.mjs --strict --output=p1-diagnostic/open-candidate-overlap.json > p1-diagnostic/open-overlap.log 2>&1
          echo "overlap_exit=$?" >> p1-diagnostic/open-overlap.log
          npm run candidates:scan-check -- --output=p1-diagnostic/candidate-scan.json > p1-diagnostic/candidate-scan.log 2>&1
          echo "scan_exit=$?" >> p1-diagnostic/candidate-scan.log
          exit 0
      - name: Commit diagnostic output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add p1-diagnostic
          git commit -m "[CF-Pages-Skip] Capture P1 candidate overlap diagnostics"
          git push origin HEAD:d750-batch-p1-fullsail-galaswap-heliswap

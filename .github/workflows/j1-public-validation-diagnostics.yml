name: J1 public validation diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/j1-public-validation-diagnostics.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-validator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d750-batch-j1-exchange-entities
      - name: Narrow obsolete-count guard to summary labels
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate-public-output-consistency.mjs')
          text = path.read_text()
          old = "assert(!/\\b386\\b/.test(stripHtml(html)), `${route} contains obsolete count 386`)"
          new = "assert(!/\\b(?:Total records|Total entities|Entities)\\s+386\\b/.test(stripHtml(html)), `${route} contains obsolete total count 386`)"
          if old not in text:
              raise SystemExit('target assertion not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit validator fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/validate-public-output-consistency.mjs
          git commit -m "[CF-Pages-Skip] Narrow obsolete-count public output guard"
          git push origin HEAD:d750-batch-j1-exchange-entities

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate reviewed record bundles
        run: npm run records:validate

      - name: Smoke test monitoring modules
        run: npm run monitor:smoke

      - name: Check production smoke script syntax
        run: node --check scripts/check-machine-readable-production.mjs

      - name: Build
        run: npm run build

      - name: Validate machine-readable public layer
        run: node scripts/validate-machine-readable-layer.mjs

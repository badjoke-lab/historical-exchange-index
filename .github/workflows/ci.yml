name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate repository operations policy
        run: npm run policy:check

      - name: Check Cloudflare configuration tool syntax
        run: node --check scripts/configure-cloudflare-pages-project.mjs

      - name: Print desired Cloudflare Pages state
        run: npm run cloudflare:config:print

      - name: Export country or origin audit
        run: node scripts/audit-country-or-origin.mjs --output=audit-output/country-origin.json

      - name: Upload country or origin audit
        uses: actions/upload-artifact@v4
        with:
          name: country-origin-audit
          path: audit-output/country-origin.json
          retention-days: 7

      - name: Lint
        run: npm run lint

      - name: Validate reviewed record bundles
        run: npm run records:validate

      - name: Validate canonical event types
        run: npm run data:check-event-types

      - name: Validate canonical official URL statuses
        run: npm run data:check-official-url-statuses

      - name: Validate canonical evidence source types
        run: npm run data:check-source-types

      - name: Validate canonical evidence claim scopes
        run: npm run data:check-claim-scopes

      - name: Smoke test monitoring modules
        run: npm run monitor:smoke

      - name: Check production smoke script syntax
        run: node --check scripts/check-machine-readable-production.mjs

      - name: Build static production output
        run: npm run build

      - name: Validate machine-readable public layer
        run: npm run machine:validate

      - name: Validate built HTML and JSON count consistency
        run: npm run public:validate

name: Canonical-only DEX repair queue

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/check-canonical-only-dex-repair-queue.mjs --strict --output=audit-output/canonical-only-dex-repair-queue.json --markdown=audit-output/canonical-only-dex-repair-queue.md
      - uses: actions/upload-artifact@v4
        with:
          name: canonical-only-dex-repair-queue
          path: |
            audit-output/canonical-only-dex-repair-queue.json
            audit-output/canonical-only-dex-repair-queue.md
          retention-days: 14

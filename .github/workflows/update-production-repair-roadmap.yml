name: Update production repair roadmap

on:
  push:
    branches:
      - fix/production-build-contract-20260619
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-roadmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/production-build-contract-20260619

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply guarded roadmap update
        run: node scripts/update-roadmap-checkpoint.mjs

      - name: Commit roadmap only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/HEI_V1_EXECUTION_ROADMAP.md
          if git diff --cached --quiet; then
            echo "Roadmap already current."
          else
            git commit -m "Update roadmap for production output repair"
            git push origin HEAD:fix/production-build-contract-20260619
          fi

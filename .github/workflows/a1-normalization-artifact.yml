name: A1 normalization artifact

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  normalize:
    if: github.head_ref == 'fix/a1-official-url-status-normalization-20260619'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/a1-official-url-status-normalization-20260619

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply guarded normalization
        run: node scripts/bootstrap-a1-official-url-status-normalization.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate normalized URL statuses
        run: npm run data:check-official-url-statuses

      - name: Validate canonical records
        run: npm run records:validate

      - name: Package normalized outputs
        uses: actions/upload-artifact@v4
        with:
          name: hei-a1-normalized-files
          path: |
            data/entities.json
            scripts/monitoring/core/constants.mjs
            scripts/audit-legacy-enums.mjs
            package.json
            docs/HEI_V1_EXECUTION_ROADMAP.md
            docs/audits/HEI_A1_OFFICIAL_URL_STATUS_AUDIT_2026-06-19.md
          if-no-files-found: error
          retention-days: 1

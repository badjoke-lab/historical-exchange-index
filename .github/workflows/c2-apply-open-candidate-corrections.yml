name: Apply open candidate corrections

on:
  push:
    branches:
      - c2-growth-batch-01a
    paths:
      - .github/workflows/c2-apply-open-candidate-corrections.yml
      - scripts/apply-open-overlap-corrections.mjs

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: c2-growth-batch-01a
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/apply-open-overlap-corrections.mjs
      - run: node scripts/audit-open-candidate-canonical-overlap.mjs --strict
      - run: npm run candidates:scan-test
      - run: npm run candidates:scan-check
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Correct stale open candidate resolutions
          file_pattern: data-staging/watchlists/resolution/index.json data-staging/candidate-scans/c1-scan-01.json
          branch: c2-growth-batch-01a

name: Apply B1 reviewed bundle cleanup

on:
  push:
    branches:
      - b1-full-monitoring-run
    paths:
      - .github/workflows/b1-enum-migration.yml
      - scripts/migrate-reviewed-bundle-enums-b1.mjs
      - scripts/patch-l2-pre-b1-baseline.mjs
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.event_name != 'pull_request' || github.head_ref == 'b1-full-monitoring-run'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: b1-full-monitoring-run
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply reviewed bundle enum migration
        run: node scripts/migrate-reviewed-bundle-enums-b1.mjs
      - name: Freeze L2 pre-B1 baseline
        run: node scripts/patch-l2-pre-b1-baseline.mjs
      - name: Commit B1 cleanup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Complete B1 projected data cleanup
          file_pattern: records/exchanges/*.json scripts/check-lineage-l2-dispositions.mjs
          branch: b1-full-monitoring-run

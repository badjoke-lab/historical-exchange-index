name: Apply B1 reviewed bundle cleanup

on:
  push:
    branches:
      - b1-full-monitoring-run
    paths:
      - .github/workflows/b1-enum-migration.yml
      - scripts/migrate-reviewed-bundle-enums-b1.mjs
      - scripts/patch-l2-pre-b1-baseline.mjs
      - scripts/patch-b1-permanent-workflows.mjs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: b1-full-monitoring-run
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply reviewed bundle enum migration
        run: node scripts/migrate-reviewed-bundle-enums-b1.mjs
      - name: Freeze L2 pre-B1 baseline
        run: node scripts/patch-l2-pre-b1-baseline.mjs
      - name: Finalize permanent workflows
        run: node scripts/patch-b1-permanent-workflows.mjs
      - name: Commit B1 cleanup
        run: |
          if git diff --quiet -- records/exchanges scripts/check-lineage-l2-dispositions.mjs .github/workflows/ci.yml .github/workflows/hei-monitoring.yml; then
            echo "B1 cleanup is already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add records/exchanges scripts/check-lineage-l2-dispositions.mjs .github/workflows/ci.yml .github/workflows/hei-monitoring.yml
          git commit -m "Finalize B1 monitoring gates"
          git pull --rebase origin b1-full-monitoring-run
          git push origin HEAD:b1-full-monitoring-run

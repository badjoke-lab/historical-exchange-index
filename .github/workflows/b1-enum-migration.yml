name: Apply B1 reviewed bundle cleanup

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'b1-full-monitoring-run' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: b1-full-monitoring-run
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply reviewed bundle enum migration
        run: node scripts/migrate-reviewed-bundle-enums-b1.mjs
      - name: Freeze L2 pre-B1 baseline
        run: node scripts/patch-l2-pre-b1-baseline.mjs
      - name: Finalize permanent workflows
        run: node scripts/patch-b1-permanent-workflows.mjs
      - name: Commit finalized B1 files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Finalize B1 monitoring gates
          file_pattern: .github/workflows/ci.yml .github/workflows/hei-monitoring.yml scripts/check-lineage-l2-dispositions.mjs records/exchanges/*.json
          branch: b1-full-monitoring-run

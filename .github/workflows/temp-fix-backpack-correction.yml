name: Temporary fix Backpack correction

on:
  push:
    branches:
      - rebuild-verified-unadded-0101-0150
    paths:
      - '.github/workflows/temp-fix-backpack-correction.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild-verified-unadded-0101-0150
          fetch-depth: 0
      - name: Fix correction fields
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'records/exchanges/backpack-exchange.json'
          const data = JSON.parse(fs.readFileSync(path, 'utf8'))
          data.entity.aliases = ['Backpack EU', 'backpack.exchange']
          delete data.entity_correction.expected.aliases
          delete data.entity_correction.changes.aliases
          fs.writeFileSync(path, `${JSON.stringify(data)}\n`)
          NODE
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add records/exchanges/backpack-exchange.json
          git commit -m "Fix Backpack entity correction fields"
          git push origin HEAD:rebuild-verified-unadded-0101-0150

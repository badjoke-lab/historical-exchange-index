name: Post-394 production audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Capture endpoint diagnostics
        shell: bash
        run: |
          set +e
          : > endpoint-diagnostic.txt
          origin='https://hei.badjoke-lab.com'
          key="post394-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          for path in / /dead/ /active/ /stats/ /version.json /data/manifest.json /data/entities.json /data/events.json /data/evidence.json /llms.txt /ai.txt /sitemap.xml /robots.txt; do
            rm -f headers.txt body.txt
            status=$(curl -sS -L --max-time 25 -D headers.txt -o body.txt -w '%{http_code}' "${origin}${path}?diagnostic=${key}")
            {
              echo "=== ${path} ==="
              echo "status=${status}"
              grep -iE '^(content-type|location|cf-cache-status|age|etag|last-modified):' headers.txt | tail -n 8
              echo -n 'body_prefix='
              head -c 500 body.txt | tr '\n' ' '
              echo
            } >> endpoint-diagnostic.txt
          done
          for path in /index.html /all /registry /exchanges; do
            rm -f headers.txt body.txt
            status=$(curl -sS --max-time 25 -D headers.txt -o body.txt -w '%{http_code}' "${origin}${path}")
            {
              echo "=== ${path} ==="
              echo "status=${status}"
              grep -iE '^(content-type|location|cf-cache-status|age|etag|last-modified):' headers.txt | tail -n 8
              echo -n 'body_prefix='
              head -c 300 body.txt | tr '\n' ' '
              echo
            } >> endpoint-diagnostic.txt
          done
          cat endpoint-diagnostic.txt
          exit 0

      - name: Run one-attempt diagnostic audit
        id: audit
        shell: bash
        run: |
          set +e
          sed -i 's/const maxAttempts = 18/const maxAttempts = 1/' scripts/audit-post394-production.mjs
          node scripts/audit-post394-production.mjs > audit.log 2>&1
          code=$?
          cat audit.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post394-production-diagnostics
          path: |
            endpoint-diagnostic.txt
            audit.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when production audit failed
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1

name: Post-394 production audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run one-attempt diagnostic audit
        run: |
          sed -i 's/const maxAttempts = 18/const maxAttempts = 1/' scripts/audit-post394-production.mjs
          node scripts/audit-post394-production.mjs

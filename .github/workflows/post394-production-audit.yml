name: Post-394 production audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run one-attempt diagnostic audit
        id: audit
        shell: bash
        run: |
          set +e
          sed -i 's/const maxAttempts = 18/const maxAttempts = 1/' scripts/audit-post394-production.mjs
          node scripts/audit-post394-production.mjs > audit.log 2>&1
          code=$?
          cat audit.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post394-production-audit-log
          path: audit.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when production audit failed
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1

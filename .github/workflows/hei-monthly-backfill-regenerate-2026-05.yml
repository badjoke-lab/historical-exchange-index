name: Regenerate HEI Monthly Review 2026-05

on:
  push:
    branches:
      - work-383
    paths:
      - .github/workflows/hei-monthly-backfill-regenerate-2026-05.yml

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout branch with history
        uses: actions/checkout@v6
        with:
          ref: work-383
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Locate month-end main snapshot
        id: snapshot
        run: |
          git fetch --no-tags origin main
          SNAPSHOT_SHA="$(git rev-list -1 --before='2026-06-01T00:00:00Z' origin/main)"
          if [ -z "$SNAPSHOT_SHA" ]; then
            echo "No main commit found before the review cutoff."
            exit 1
          fi
          echo "sha=$SNAPSHOT_SHA" >> "$GITHUB_OUTPUT"
          echo "Using month-end snapshot $SNAPSHOT_SHA"

      - name: Import unmerged weekly monitoring PR outputs
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_MONTH: 2026-05
        run: |
          IMPORT_ROOT="data-staging/monthly-review-input/$REVIEW_MONTH"
          rm -rf "$IMPORT_ROOT"
          mkdir -p "$IMPORT_ROOT"

          gh pr list --state all --limit 200 --json number,title,mergedAt > /tmp/monitoring-prs.json
          jq -r --arg prefix "Auto monitoring report: $REVIEW_MONTH-" '
            [.[] | select(.title | startswith($prefix))]
            | group_by(.title)
            | map(select((any(.[]; .mergedAt != null)) | not) | sort_by(.number) | last)
            | .[].number
          ' /tmp/monitoring-prs.json > /tmp/monthly-monitoring-pr-numbers.txt

          while IFS= read -r PR_NUMBER; do
            [ -n "$PR_NUMBER" ] || continue
            REF="refs/remotes/origin/monthly-pr-$PR_NUMBER"
            git fetch --no-tags origin "pull/$PR_NUMBER/head:$REF"
            gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > "/tmp/pr-$PR_NUMBER-files.txt"

            while IFS= read -r FILE_PATH; do
              case "$FILE_PATH" in
                /*|*..*)
                  echo "Invalid monitoring path: $FILE_PATH"
                  exit 1
                  ;;
                data-staging/monitoring/*|data-staging/watchlists/auto/*|data-staging/watchlists/resolution/*)
                  if git cat-file -e "$REF:$FILE_PATH" 2>/dev/null; then
                    TARGET="$IMPORT_ROOT/${FILE_PATH#data-staging/}"
                    mkdir -p "$(dirname "$TARGET")"
                    git show "$REF:$FILE_PATH" > "$TARGET"
                  fi
                  ;;
              esac
            done < "/tmp/pr-$PR_NUMBER-files.txt"
          done < /tmp/monthly-monitoring-pr-numbers.txt

      - name: Replace registry inputs with month-end snapshot
        env:
          SNAPSHOT_SHA: ${{ steps.snapshot.outputs.sha }}
        run: |
          git checkout "$SNAPSHOT_SHA" -- data/entities.json data/events.json data/evidence.json
          rm -rf records/exchanges
          if git ls-tree -d --name-only "$SNAPSHOT_SHA" records/exchanges | grep -q .; then
            git checkout "$SNAPSHOT_SHA" -- records/exchanges
          else
            mkdir -p records/exchanges
          fi

      - name: Build and validate month-end review
        env:
          SNAPSHOT_SHA: ${{ steps.snapshot.outputs.sha }}
        run: |
          rm -rf data-staging/monthly-reviews/2026-05
          npm run machine:build
          node scripts/review/build-monthly-review.mjs --month 2026-05

          node --input-type=module <<'NODE'
          import fs from 'node:fs'
          const manifestPath = 'data-staging/monthly-reviews/2026-05/manifest.json'
          const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'))
          manifest.source_snapshot = {
            repository_commit: process.env.SNAPSHOT_SHA,
            cutoff: '2026-05-31T23:59:59.999Z',
            method: 'latest main commit at or before cutoff',
          }
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`)
          NODE

          node scripts/review/validate-monthly-review.mjs --month 2026-05

      - name: Restore current branch registry inputs
        run: |
          rm -rf records/exchanges
          git checkout HEAD -- records/exchanges
          git checkout HEAD -- data/entities.json data/events.json data/evidence.json
          rm -rf data-staging/monthly-review-input/2026-05

          if git status --porcelain -- data/entities.json data/events.json data/evidence.json records/exchanges | grep .; then
            echo "Backfill left registry input changes behind."
            exit 1
          fi

      - name: Commit regenerated review and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-staging/monthly-reviews/2026-05
          git rm .github/workflows/hei-monthly-backfill-regenerate-2026-05.yml
          git commit -m "Regenerate HEI monthly review 2026-05 from month-end snapshot"
          git push origin HEAD:work-383

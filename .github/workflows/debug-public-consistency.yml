name: Debug public consistency

on:
  push:
    branches: [audit-count-consistency-20260618]
    paths:
      - .github/workflows/debug-public-consistency.yml
      - scripts/validate-machine-readable-layer.mjs
      - scripts/validate-public-output-consistency.mjs
      - scripts/build-machine-readable-layer.mjs

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: audit-count-consistency-20260618
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Capture validators
        run: |
          mkdir -p docs/audits
          {
            echo '# machine validator'
            npm run machine:validate
            echo
            echo '# public output validator'
            npm run public:validate
          } > docs/audits/latest-public-consistency-validation.log 2>&1 || true
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Record public consistency validation output
          branch: audit-count-consistency-20260618

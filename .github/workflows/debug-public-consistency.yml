name: Debug public consistency

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent >/dev/null
      - run: npm run build --silent >/dev/null
      - name: Validate machine layer
        run: npm run machine:validate --silent
      - name: Validate built public output
        run: npm run public:validate --silent

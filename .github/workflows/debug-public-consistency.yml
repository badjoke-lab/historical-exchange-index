name: Debug public consistency

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent >/dev/null
      - name: Capture lint diagnostic
        continue-on-error: true
        run: npm run lint --silent > lint-diagnostic.log 2>&1
      - name: Post lint diagnostic
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          printf '## Lint diagnostic\n\n```text\n' > diagnostics.md
          cat lint-diagnostic.log >> diagnostics.md
          printf '\n```\n' >> diagnostics.md
          gh pr comment "$PR_NUMBER" --body-file diagnostics.md

name: A1 normalization bootstrap

on:
  push:
    branches:
      - fix/a1-official-url-status-normalization-20260619
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/a1-official-url-status-normalization-20260619

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply guarded normalization
        run: node scripts/bootstrap-a1-official-url-status-normalization.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate normalized URL statuses
        run: npm run data:check-official-url-statuses

      - name: Validate canonical records
        run: npm run records:validate

      - name: Commit normalized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/entities.json scripts/monitoring/core/constants.mjs scripts/audit-legacy-enums.mjs package.json .github/workflows/ci.yml docs/HEI_V1_EXECUTION_ROADMAP.md docs/audits/HEI_A1_OFFICIAL_URL_STATUS_AUDIT_2026-06-19.md
          if git diff --cached --quiet; then
            echo "No normalization changes to commit."
          else
            git commit -m "Normalize canonical official URL statuses"
            git push origin HEAD:fix/a1-official-url-status-normalization-20260619
          fi

name: Migrate legacy claim scopes

on:
  push:
    branches: [work-391]
    paths: [.github/workflows/migrate-claim-scopes.yml]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work-391
      - name: Normalize claim scopes
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('data/evidence.json')
          evidence = json.loads(path.read_text())
          mapping = {
            'background': 'entity',
            'country': 'entity',
            'domain_status': 'url_history',
            'entity_event': 'event',
            'identity': 'entity',
            'successor': 'ownership',
          }
          changed = 0
          counts = {}
          for item in evidence:
              old = item.get('claim_scope')
              if old not in mapping:
                  continue
              item['claim_scope'] = mapping[old]
              counts[old] = counts.get(old, 0) + 1
              changed += 1
          if changed != 26:
              raise SystemExit(f'Expected 26 claim_scope changes, found {changed}: {counts}')
          path.write_text(json.dumps(evidence, indent=2, ensure_ascii=False) + '\n')
          print(counts)
          PY
      - name: Remove temporary workflow
        run: rm -f .github/workflows/migrate-claim-scopes.yml
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Normalize legacy claim scopes
          branch: work-391

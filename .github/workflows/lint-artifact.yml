name: Lint artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent >/dev/null
      - name: Capture lint output
        run: npm run lint --silent > lint.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint.log

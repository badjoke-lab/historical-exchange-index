name: Apply recent CEX DEX watch package

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-recent-cex-dex-watch.yml
      - data-staging/manual/recent-cex-dex-watch-20260425.json
      - data-staging/manual/recent-cex-dex-watch-20260425.trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-recent-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply staged recent exchange watch package to canonical JSON
        run: |
          node <<'NODE'
          const fs = require('fs');

          const packagePath = 'data-staging/manual/recent-cex-dex-watch-20260425.json';
          const entityPath = 'data/entities.json';
          const eventPath = 'data/events.json';
          const evidencePath = 'data/evidence.json';

          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          const stagedEntities = pkg.records.entities || [];
          const stagedEvents = pkg.records.events || [];
          const stagedEvidence = pkg.records.evidence || [];

          function readJson(path) {
            return JSON.parse(fs.readFileSync(path, 'utf8'));
          }

          function writeJson(path, value) {
            fs.writeFileSync(path, JSON.stringify(value, null, 2) + '\n');
          }

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          const entities = readJson(entityPath);
          const events = readJson(eventPath);
          const evidence = readJson(evidencePath);

          const entityIds = new Set(entities.map((row) => row.id));
          const entitySlugs = new Map(entities.map((row) => [row.slug, row.id]));
          const eventIds = new Set(events.map((row) => row.id));
          const evidenceIds = new Set(evidence.map((row) => row.id));

          let addedEntities = 0;
          let addedEvents = 0;
          let addedEvidence = 0;

          for (const entity of stagedEntities) {
            if (entityIds.has(entity.id)) {
              console.log(`${entity.id} already exists; skipping entity append.`);
              continue;
            }
            if (entitySlugs.has(entity.slug)) {
              fail(`Possible duplicate slug found for ${entity.slug}: existing ${entitySlugs.get(entity.slug)}, staged ${entity.id}`);
            }
            entities.push(entity);
            entityIds.add(entity.id);
            entitySlugs.set(entity.slug, entity.id);
            addedEntities += 1;
          }

          const knownEntityIds = new Set(entities.map((row) => row.id));
          for (const event of stagedEvents) {
            if (eventIds.has(event.id)) {
              console.log(`${event.id} already exists; skipping event append.`);
              continue;
            }
            if (!knownEntityIds.has(event.exchange_id)) {
              fail(`Event ${event.id} points to missing exchange_id ${event.exchange_id}`);
            }
            events.push(event);
            eventIds.add(event.id);
            addedEvents += 1;
          }

          const knownEventIds = new Set(events.map((row) => row.id));
          for (const src of stagedEvidence) {
            if (evidenceIds.has(src.id)) {
              console.log(`${src.id} already exists; skipping evidence append.`);
              continue;
            }
            if (!knownEntityIds.has(src.exchange_id)) {
              fail(`Evidence ${src.id} points to missing exchange_id ${src.exchange_id}`);
            }
            if (src.event_id && !knownEventIds.has(src.event_id)) {
              fail(`Evidence ${src.id} points to missing event_id ${src.event_id}`);
            }
            evidence.push(src);
            evidenceIds.add(src.id);
            addedEvidence += 1;
          }

          writeJson(entityPath, entities);
          writeJson(eventPath, events);
          writeJson(evidencePath, evidence);

          console.log(`Applied recent watch package: +${addedEntities} entities, +${addedEvents} events, +${addedEvidence} evidence.`);
          NODE

      - name: Commit canonical JSON updates
        run: |
          if git diff --quiet -- data/entities.json data/events.json data/evidence.json; then
            echo "No canonical changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/entities.json data/events.json data/evidence.json
          git commit -m "Apply recent CEX DEX watch canonical batch"
          git push

name: J1 remove global 386 scan

on:
  pull_request:
    paths:
      - '.github/workflows/j1-remove-global-386-scan.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-validator:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d750-batch-j1-exchange-entities
      - name: Remove global historical-count scan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate-public-output-consistency.mjs')
          text = path.read_text()
          target = "const textFiles = walk(outDir).filter((filePath) => ['.html','.json','.txt','.xml'].includes(path.extname(filePath)))\nconst staleFiles = textFiles.filter((filePath) => /\\b386\\b/.test(fs.readFileSync(filePath, 'utf8')))\nassert(staleFiles.length === 0, `obsolete count 386 found in ${staleFiles.map((filePath) => path.relative(root, filePath)).join(', ')}`)\n"
          if target not in text:
              raise SystemExit('target stale-file scan not found')
          path.write_text(text.replace(target, '', 1))
          PY
      - name: Commit validator fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/validate-public-output-consistency.mjs
          git commit -m "[CF-Pages-Skip] Allow historical counts in stats snapshots"
          git push origin HEAD:d750-batch-j1-exchange-entities

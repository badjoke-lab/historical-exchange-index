name: Migrate legacy source types

on:
  push:
    branches: [work-390]
    paths: [.github/workflows/migrate-source-types.yml]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work-390
      - name: Normalize source types
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('data/evidence.json')
          evidence = json.loads(path.read_text())
          mapping = {
            'archived_official': 'archive_capture',
            'archived_official_notice': 'archive_capture',
            'company_notice': 'official_statement',
            'company_profile': 'official_statement',
            'forum_post': 'community_reference',
            'government_statement': 'regulatory_notice',
            'legal_document': 'court_document',
            'legal_reference': 'court_document',
            'news_report': 'news_article',
            'official_help': 'official_statement',
            'official_post': 'official_blog',
            'press_release': 'official_statement',
            'regulatory_statement': 'regulatory_notice',
            'review': 'database_reference',
            'status_page': 'official_statement',
            'website_notice': 'official_statement',
            'wiki_reference': 'database_reference',
          }

          changed = 0
          counts = {}
          for item in evidence:
              old = item.get('source_type')
              if old not in mapping:
                  continue
              item['source_type'] = mapping[old]
              counts[old] = counts.get(old, 0) + 1
              changed += 1

          if changed != 76:
              raise SystemExit(f'Expected 76 source_type changes, found {changed}: {counts}')
          path.write_text(json.dumps(evidence, indent=2, ensure_ascii=False) + '\n')
          print(counts)
          PY
      - name: Remove temporary workflow
        run: rm -f .github/workflows/migrate-source-types.yml
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Normalize legacy source types
          branch: work-390

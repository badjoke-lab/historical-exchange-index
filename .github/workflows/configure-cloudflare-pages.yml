name: Configure Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Compare or apply the repository Cloudflare Pages policy
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-configuration
  cancel-in-progress: false

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate repository policy files
        run: node scripts/check-repository-operations-policy.mjs

      - name: Configure Cloudflare Pages project
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node scripts/configure-cloudflare-pages-project.mjs --${{ inputs.mode }}

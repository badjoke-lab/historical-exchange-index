name: Public validation diagnostics

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run machine:build
      - run: npm run build
      - name: Public output consistency
        id: public_consistency
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/validate-public-output-consistency.mjs 2>&1 | tee public-consistency.log
      - name: Upload public consistency diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-consistency-diagnostics
          path: public-consistency.log
      - name: Fail when public consistency failed
        if: steps.public_consistency.outcome == 'failure'
        run: exit 1
      - name: Reviewed update feed export
        run: node scripts/validate-reviewed-update-feed-export.mjs
      - name: Internal link self-test
        run: node scripts/audit-internal-links.mjs --self-test
      - name: Internal link audit
        run: node scripts/audit-internal-links.mjs
      - name: Metadata self-test
        run: node scripts/audit-public-metadata.mjs --self-test
      - name: Metadata audit
        run: node scripts/audit-public-metadata-v2.mjs
      - name: Sitemap self-test
        run: node scripts/audit-sitemap-canonical-routes.mjs --self-test
      - name: Sitemap audit
        run: node scripts/audit-sitemap-canonical-routes.mjs
      - name: Navigation self-test
        run: node scripts/audit-public-navigation-discovery.mjs --self-test
      - name: Navigation audit
        run: node scripts/audit-public-navigation-discovery.mjs
      - name: Stats Explorer handoff
        run: node scripts/validate-stats-explorer-handoff.mjs
      - name: Explorer contract validation
        run: node scripts/validate-explorer-query-contract.mjs
      - name: Explorer contract tests
        run: node scripts/test-explorer-query-contract.mjs
      - name: i18n foundation validation
        run: node scripts/validate-i18n-foundation.mjs
      - name: i18n foundation tests
        run: node scripts/test-i18n-foundation.mjs

name: Audit official URL status

on:
  push:
    branches: [work-393]
    paths:
      - .github/workflows/audit-official-url-status.yml
      - scripts/audit-official-url-status.mjs

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: work-393
      - name: Generate audit report
        run: node scripts/audit-official-url-status.mjs --report=data-staging/audits/invalid-official-url-status.json
      - name: Update roadmap checkpoint
        run: node scripts/update-roadmap-a1.mjs
      - uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: Record A1 validation and checkpoint
          branch: work-393

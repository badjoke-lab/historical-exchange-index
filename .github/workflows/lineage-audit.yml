name: Lineage inventory audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  a4-record-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Validate A4 record bundles
        run: npm run records:validate

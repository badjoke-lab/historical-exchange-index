name: Lineage inventory audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply-reviewed-a4:
    if: github.head_ref == 'a4-apply-lineage'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout A4 branch
        uses: actions/checkout@v4
        with:
          ref: a4-apply-lineage
          fetch-depth: 1
          show-progress: false
      - name: Apply reviewed A4 changes
        run: |
          if [ -f config/lineage-a4-application.json ]; then
            echo "A4 application already exists; skipping regeneration."
          else
            node scripts/apply-reviewed-lineage-a4.mjs
          fi
      - name: Validate record bundles
        continue-on-error: true
        run: npm run records:validate
      - name: Commit reviewed application
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Apply reviewed A4 lineage actions"
          git push origin HEAD:a4-apply-lineage

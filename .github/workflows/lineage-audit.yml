name: Lineage inventory audit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply-reviewed-a4:
    if: github.head_ref == 'a4-apply-lineage'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout A4 branch
        uses: actions/checkout@v4
        with:
          ref: a4-apply-lineage
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply reviewed A4 changes
        run: node scripts/apply-reviewed-lineage-a4.mjs
      - name: Validate record bundles
        run: npm run records:validate
      - name: Commit reviewed application
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Apply reviewed A4 lineage actions"
          git push origin HEAD:a4-apply-lineage

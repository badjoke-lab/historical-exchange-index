name: Generate HEI Monthly Review 2026-05

on:
  push:
    branches:
      - work-385a
    paths:
      - .github/workflows/hei-monthly-backfill-2026-05.yml

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: work-385a
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Smoke test monthly review modules
        run: npm run monitor:smoke

      - name: Import unmerged May monitoring outputs
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_MONTH: 2026-05
        run: |
          IMPORT_ROOT="data-staging/monthly-review-input/$REVIEW_MONTH"
          rm -rf "$IMPORT_ROOT"
          mkdir -p "$IMPORT_ROOT"

          gh pr list --state all --limit 200 --json number,title,mergedAt > /tmp/monitoring-prs.json
          jq -r --arg prefix "Auto monitoring report: $REVIEW_MONTH-" '
            [.[] | select(.title | startswith($prefix))]
            | group_by(.title)
            | map(select((any(.[]; .mergedAt != null)) | not) | sort_by(.number) | last)
            | .[].number
          ' /tmp/monitoring-prs.json > /tmp/monthly-monitoring-pr-numbers.txt

          while IFS= read -r PR_NUMBER; do
            [ -n "$PR_NUMBER" ] || continue
            REF="refs/remotes/origin/monthly-pr-$PR_NUMBER"
            git fetch --no-tags origin "pull/$PR_NUMBER/head:$REF"
            gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > "/tmp/pr-$PR_NUMBER-files.txt"

            while IFS= read -r FILE_PATH; do
              case "$FILE_PATH" in
                /*|*..*)
                  echo "Invalid monitoring path: $FILE_PATH"
                  exit 1
                  ;;
                data-staging/monitoring/*|data-staging/watchlists/auto/*|data-staging/watchlists/resolution/*)
                  if git cat-file -e "$REF:$FILE_PATH" 2>/dev/null; then
                    TARGET="$IMPORT_ROOT/${FILE_PATH#data-staging/}"
                    mkdir -p "$(dirname "$TARGET")"
                    git show "$REF:$FILE_PATH" > "$TARGET"
                  fi
                  ;;
              esac
            done < "/tmp/pr-$PR_NUMBER-files.txt"
          done < /tmp/monthly-monitoring-pr-numbers.txt

      - name: Build and validate review
        run: |
          npm run machine:build
          node scripts/review/build-monthly-review.mjs --month 2026-05
          node scripts/review/validate-monthly-review.mjs --month 2026-05

      - name: Guard canonical data
        run: |
          rm -rf data-staging/monthly-review-input/2026-05
          if git status --porcelain -- data/entities.json data/events.json data/evidence.json | grep .; then
            echo "Backfill must not modify canonical data files."
            exit 1
          fi

      - name: Commit validated review only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-staging/monthly-reviews/2026-05
          git rm .github/workflows/hei-monthly-backfill-2026-05.yml
          git commit -m "Add HEI monthly review 2026-05"
          git push origin HEAD:work-385a

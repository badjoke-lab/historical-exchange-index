name: Accessibility gate

on:
  pull_request:
    paths:
      - 'src/app/**'
      - 'src/components/**'
      - 'src/lib/**'
      - 'scripts/audit-public-accessibility.mjs'
      - 'docs/HEI_V1_INTEGRATION_BASELINE_SPEC.md'
      - 'package.json'
      - '.github/workflows/accessibility-gate.yml'
  workflow_dispatch:

jobs:
  accessibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run machine:build
      - run: npm run build
      - name: Accessibility audit self-test
        run: npm run accessibility:test
      - name: Public accessibility audit
        run: npm run accessibility:audit
